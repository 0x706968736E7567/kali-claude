services:
  kali-agent:
    build: .
    image: kali-claude
    container_name: kali_workspace
    stdin_open: true
    tty: true
    cap_add:
      - NET_ADMIN     # iptables, routing, interface config
      - NET_RAW       # raw packets (nmap -sS, scapy)
      - SYS_PTRACE    # debug/RE attached processes (gdb, frida, strace)
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    # Uncomment to expose mitmweb's browser UI on the host (http://localhost:8081)
    # for Burp-style inspection/tamper/replay of traffic captured INSIDE the
    # container. Start it inside with:  mitmweb --listen-host 0.0.0.0 --web-host 0.0.0.0
    # ports:
    #   - "8081:8081"
    volumes:
      - ./workspace:/home/operator/workspace
      - ./loot:/home/operator/loot
      # Persist Claude Code auth + history across container restarts.
      - claude-config:/home/operator/.claude

volumes:
  claude-config:
